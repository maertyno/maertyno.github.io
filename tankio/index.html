<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Tankio support and privacy information." />
  <meta name="theme-color" content="#0a100d" />
  <title>Tankio</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./tankio.css" />
</head>
<body data-page="home">
  <main class="wrap">
    <header class="topline">
      <a class="brand" href="/tankio/"><span class="brand-mark"><img src="./app-icon.webp" alt="Tankio app icon" width="640" height="640" decoding="async" /></span><span>Tankio</span></a>
      <div class="language-bar" data-language-bar aria-label="Language"></div>
    </header>

    <section class="intro">
      <p class="eyebrow" data-i18n="home.eyebrow">App information</p>
      <h1 data-i18n="home.title">Tankio</h1>
      <p class="lead" data-i18n="home.lead">Travel cost calculator for fuel, tolls, saved trips, nearby fuel stations, and PDF exports.</p>
    </section>

    <section class="document">
      <div class="link-list">
        <a class="link-row" href="/tankio/privacy/">
          <strong data-i18n="home.privacyLink">Privacy Policy</strong>
          <span data-i18n="home.privacyText">How Tankio handles data, permissions, and external services.</span>
        </a>
        <a class="link-row" href="/tankio/support/">
          <strong data-i18n="home.supportLink">Support</strong>
          <span data-i18n="home.supportText">Help, contact details, and issue reporting.</span>
        </a>
      </div>
    </section>

    <footer class="footer">Tankio</footer>
  </main>
  <script src="./tankio.js" defer></script>
</body>
</html>
